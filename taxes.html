<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Taxes</title><link rel="stylesheet" href="styles.css" /></head><body data-page="taxes"><div class="layout"><aside class="sidebar"></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label>Email or Username <input id="forgot-identifier" type="text" required /></label><button type="submit">Send Reset Link</button></form><div class="auth-actions"><button id="toggle-signup-btn" type="button">Create account</button><button id="toggle-verify-btn" type="button">Verify account</button><button id="toggle-forgot-btn" type="button">Forgot password</button><button id="toggle-login-btn" type="button">Back to login</button></div><p id="auth-message"></p></section><section id="app-content" class="hidden"><section class="card"><h2>Add Tax Year</h2><form id="taxes-form"><div class="form-grid"><label>Tax Year <input id="tax-year" type="number" min="1900" max="3000" required /></label><label>Tax PDF (optional) <input id="tax-file" type="file" accept="application/pdf" /></label><label>Federal Tax ($) <input id="tax-federal" type="number" min="0" step="0.01" required /></label><label>State Tax ($) <input id="tax-state" type="number" min="0" step="0.01" required /></label><label>Local Tax ($) <input id="tax-local" type="number" min="0" step="0.01" required /></label><label>Notes <input id="tax-notes" type="text" /></label></div><button id="taxes-submit-btn" type="submit">Save Tax Year</button><p id="taxes-message"></p></form></section><section class="card"><h2>Tax Years</h2><div class="table-wrap"><table><thead><tr><th>Year</th><th>Federal</th><th>State</th><th>Local</th><th>File</th><th>Actions</th></tr></thead><tbody id="taxes-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
