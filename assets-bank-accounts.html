<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Assets Bank Accounts</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{brand:{500:"#4f46e5",600:"#4338ca"}}}}};</script><link rel="stylesheet" href="styles.css" /></head><body data-page="assets-bank-accounts"><div class="layout"><aside class="sidebar"><h2>Finance Tracker</h2><nav class="side-menu"><a href="/">Home</a><a href="/records.html">Records</a><a href="/investments.html">Investments</a><a href="/assets-vehicles.html" class="active">Assets</a><a href="/net-worth-report.html">Net Worth Report</a><a id="nav-admin" href="/admin-users.html" class="hidden">Admin</a></nav></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label
