<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Finance Tracker - Backup Settings</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="admin-backups">
  <div class="layout">
    <aside class="sidebar">
      <h2>Finance Tracker</h2>
      <nav class="side-menu">
        <a href="/">Home</a>
        <a href="/records.html">Records</a>
        <a href="/investments.html">Investments</a>
        <a href="/assets-vehicles.html">Assets</a>
        <a href="/net-worth-report.html">Net Worth Report</a>
        <a id="nav-admin" href="/admin-users.html" class="active">Admin</a>
      </nav>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="session-controls">
          <span id="session-name">Not signed in</span>
          <button id="logout-btn" type="button">Logout</button>
        </div>
      </header>

      <main class="container">
        <section id="auth-card" class="card auth-card hidden">
          <h2>Sign In</h2>
          <form id="login-form">
            <label>Username <input id="login-username" type="text" required /></label>
            <label>Password <input id="login-password" type="password" required /></label>
            <button type="submit">Log In</button>
          </form>
          <form id="signup-form" class="hidden">
            <label>Full Name <input id="signup-full-name" type="text" required /></label>
            <label>Email <input id="signup-email" type="email" required /></label>
            <label>Username <input id="signup-username" type="text" required /></label>
            <label>Password <input id="signup-password" type="password" required /></label>
            <button type="submit">Create Account</button>
          </form>
          <form id="verify-form" class="hidden">
            <label>Username <input id="verify-username" type="text" required /></label>
            <label>Verification Code <input id="verify-code" type="text" required /></label>
            <button type="submit">Verify Account</button>
          </form>
          <form id="forgot-password-form" class="hidden">
            <label>Email or Username <input id="forgot-identifier" type="text" required /></label>
            <button type="submit">Send Reset Link</button>
          </form>
          <div class="auth-actions">
            <button id="toggle-signup-btn" type="button">Create account</button>
            <button id="toggle-verify-btn" type="button">Verify account</button>
            <button id="toggle-forgot-btn" type="button">Forgot password</button>
            <button id="toggle-login-btn" type="button">Back to login</button>
          </div>
          <p id="auth-message"></p>
        </section>

        <section id="app-content" class="hidden">
          <section class="card admin-subnav-card">
            <div class="admin-subnav">
              <a href="/admin-users.html">User Settings</a>
              <a href="/admin-email.html">Email Settings</a>
              <a href="/admin-backups.html" class="active">Backup Settings</a>
              <a href="/admin-notifications.html">Notifications</a>
            </div>
          </section>

          <section class="card">
            <h2>Backup Settings</h2>
            <form id="backup-settings-form">
              <label class="checkbox-row"><input id="backup-enabled" type="checkbox" /> Enable automatic backups</label>
              <label>Run every (hours) <input id="backup-interval-hours" type="number" min="1" value="24" /></label>
              <label>Keep latest backups (count) <input id="backup-keep-count" type="number" min="1" value="10" /></label>
              <p class="small-note">Next run: <span id="backup-next-run">Not scheduled</span></p>
              <button type="submit">Save Backup Settings</button>
              <button id="run-backup-btn" type="button">Run Backup Now</button>
              <p id="backup-settings-message"></p>
            </form>
          </section>

          <section class="card">
            <h2>Available Backups</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>File</th><th>Size</th><th>Created</th><th>Action</th></tr></thead>
                <tbody id="backup-files-body"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>

  <footer class="version-footer"><span id="version-info">Version ...</span></footer>
  <script src="app.js"></script>
</body>
</html>
