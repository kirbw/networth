<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Liabilities Mortgages</title><link rel="stylesheet" href="styles.css" /></head>
<body data-page="liabilities-mortgages"><div class="layout"><aside class="sidebar"></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label>Email or Username <input id="forgot-identifier" type="text" required /></label><button type="submit">Send Reset Link</button></form><div class="auth-actions"><button id="toggle-signup-btn" type="button">Create account</button><button id="toggle-verify-btn" type="button">Verify account</button><button id="toggle-forgot-btn" type="button">Forgot password</button><button id="toggle-login-btn" type="button">Back to login</button></div><p id="auth-message"></p></section><section id="app-content" class="hidden"><section class="card admin-subnav-card"><div class="admin-subnav"><a href="/liabilities-mortgages.html" class="active">Mortgages</a><a href="/liabilities-credit-cards.html">Credit Cards</a><a href="/liabilities-loans.html">Loans</a><a href="/liabilities-recurring-expenses.html">Recurring Expenses</a></div></section><section class="card"><h2>Add Mortgage</h2><form id="mortgages-form"><div class="form-grid"><label>Description <input id="mort-description" type="text" required /></label><label>Linked Real Estate <select id="mort-real-estate-id"></select></label><label>Account Number <input id="mort-account-number" type="text" /></label><label>Interest Rate (%) <input id="mort-interest-rate" type="number" min="0" step="0.01" required /></label><label>Monthly Payment ($) <input id="mort-monthly-payment" type="number" min="0" step="0.01" /></label><label>Start Date <input id="mort-start-date" type="date" /></label><label>Initial Amount ($) <input id="mort-initial-amount" type="number" min="0" step="0.01" required /></label><label>Current Balance ($) <input id="mort-current-balance" type="number" min="0" step="0.01" required /></label><label>Interest Change Date <input id="mort-interest-change-date" type="date" /></label><label>End Date <input id="mort-end-date" type="date" /></label></div><button type="submit" id="mortgages-submit-btn">Add Mortgage</button><p id="mortgages-message"></p></form></section><section class="card"><h2>Mortgages</h2><div class="table-wrap"><table><thead><tr><th data-sort-mortgages="description" class="sortable">Description</th><th>Linked Property</th><th data-sort-mortgages="account_number" class="sortable">Account #</th><th data-sort-mortgages="interest_rate" class="sortable">Interest Rate</th><th data-sort-mortgages="monthly_payment" class="sortable">Monthly Payment</th><th data-sort-mortgages="start_date" class="sortable">Start Date</th><th data-sort-mortgages="initial_amount" class="sortable">Initial Amount</th><th data-sort-mortgages="current_balance" class="sortable">Current Balance</th><th data-sort-mortgages="interest_change_date" class="sortable">Interest Change Date</th><th data-sort-mortgages="end_date" class="sortable">End Date</th><th>Actions</th></tr></thead><tbody id="mortgages-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
