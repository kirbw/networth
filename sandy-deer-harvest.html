<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Sandy Lake Retreat - Deer Harvest</title><link rel="stylesheet" href="styles.css" /><script src="https://cdn.jsdelivr.net/npm/chart.js"></script></head><body data-page="sandy-deer-harvest"><div class="layout"><aside class="sidebar"></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label>Email or Username <input id="forgot-identifier" type="text" required /></label><button type="submit">Send Reset Link</button></form><div class="auth-actions"><button id="toggle-signup-btn" type="button">Create account</button><button id="toggle-verify-btn" type="button">Verify account</button><button id="toggle-forgot-btn" type="button">Forgot password</button><button id="toggle-login-btn" type="button">Back to login</button></div><p id="auth-message"></p></section><section id="app-content" class="hidden"><section class="card sandy-subnav"><a href="/sandy-goals.html">Goals</a><a href="/sandy-deer-harvest.html" class="active">Deer Harvest</a><a href="/sandy-food-plots.html">Food Plot History</a><a href="/sandy-expenses.html">Expenses</a></section><section class="card"><h2>Harvest Totals by Hunter</h2><canvas id="sandy-deer-hunter-chart"></canvas></section><section class="card"><h2>Add Harvest Entry</h2><form id="sandy-deer-form"><div class="form-grid"><label>Year <input id="sandy-deer-year" type="number" min="2000" max="3000" required /></label><label>Hunter <input id="sandy-deer-hunter" type="text" required /></label><label>Buck or Doe <select id="sandy-deer-type"><option value="Buck">Buck</option><option value="Doe">Doe</option></select></label><label>Photo (optional) <input id="sandy-deer-photo" type="file" accept="image/*" /></label><label class="checkbox-row">Remove existing photo <input id="sandy-deer-clear-photo" type="checkbox" /></label><label class="form-span-all">Notes (optional) <textarea id="sandy-deer-notes" rows="3"></textarea></label></div><button id="sandy-deer-submit-btn" type="submit">Add Harvest</button><p id="sandy-deer-message"></p></form></section><section class="card"><h2>Harvest Log</h2><div class="table-wrap"><table><thead><tr><th>Year</th><th>Hunter</th><th>Type</th><th>Notes</th><th>Photo</th><th>Actions</th></tr></thead><tbody id="sandy-deer-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
