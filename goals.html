<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Goals</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{brand:{500:"#4f46e5",600:"#4338ca"}}}}};</script><link rel="stylesheet" href="styles.css" /></head><body data-page="goals"><div class="layout"><aside class="sidebar"></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label>Email or Username <input id="forgot-identifier" type="text" required /></label><button type="submit">Send Reset Link</button></form><div class="auth-actions"><button id="toggle-signup-btn" type="button">Create account</button><button id="toggle-verify-btn" type="button">Verify account</button><button id="toggle-forgot-btn" type="button">Forgot password</button><button id="toggle-login-btn" type="button">Back to login</button></div><p id="auth-message"></p></section><section id="app-content" class="hidden"><section class="card"><h2>Add Goal</h2><form id="goals-form"><div class="form-grid"><label>Goal Name <input id="goal-name" type="text" required /></label><label>Goal Type <select id="goal-type"><option value="save-up">Save Up Goal</option><option value="pay-down">Pay Down Goal</option></select></label><label>Target Amount ($) <input id="goal-target-amount" type="number" min="0" step="0.01" required /></label><label>Category <select id="goal-target-category"><option value="investment">Investment</option><option value="asset">Asset</option><option value="liability">Liability</option></select></label><label>Track Subcategory <select id="goal-target-subtype"><option value="retirement-accounts">Retirement Accounts</option></select></label><label>Goal Date <input id="goal-date" type="date" /></label></div><button id="goals-submit-btn" type="submit">Add Goal</button><p id="goals-message"></p></form></section><section class="card"><h2>Goals</h2><div class="table-wrap"><table><thead><tr><th>Name</th><th>Type</th><th>Target</th><th>Progress</th><th>Goal Date</th><th>Actions</th></tr></thead><tbody id="goals-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
