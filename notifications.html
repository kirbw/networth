<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Notifications</title><script src="https://cdn.tailwindcss.com"></script><script>tailwind.config={theme:{extend:{colors:{brand:{500:"#4f46e5",600:"#4338ca"}}}}};</script><link rel="stylesheet" href="styles.css" /></head>
<body data-page="notifications"><div class="layout"><aside class="sidebar"><h2>Finance Tracker</h2><nav class="side-menu"></nav></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"></section><section id="app-content" class="hidden"><section class="card"><h2>My Notifications</h2><p id="notifications-message"></p><div class="table-wrap"><table><thead><tr><th>Created</th><th>Title</th><th>Message</th><th>Status</th><th>Actions</th></tr></thead><tbody id="notifications-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
