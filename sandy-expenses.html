<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Sandy Lake Retreat - Expenses</title><link rel="stylesheet" href="styles.css" /></head><body data-page="sandy-expenses"><div class="layout"><aside class="sidebar"></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label>Email or Username <input id="forgot-identifier" type="text" required /></label><button type="submit">Send Reset Link</button></form><div class="auth-actions"><button id="toggle-signup-btn" type="button">Create account</button><button id="toggle-verify-btn" type="button">Verify account</button><button id="toggle-forgot-btn" type="button">Forgot password</button><button id="toggle-login-btn" type="button">Back to login</button></div><p id="auth-message"></p></section><section id="app-content" class="hidden"><section class="card sandy-subnav"><a href="/sandy-goals.html">Goals</a><a href="/sandy-deer-harvest.html">Deer Harvest</a><a href="/sandy-food-plots.html">Food Plot History</a><a href="/sandy-expenses.html" class="active">Expenses</a></section><section class="card"><h2>Add Expense</h2><form id="sandy-expenses-form"><div class="form-grid"><label>Date <input id="sandy-expense-date" type="date" required /></label><label>Amount ($) <input id="sandy-expense-amount" type="number" min="0" step="0.01" required /></label><label class="form-span-all">Description <input id="sandy-expense-description" type="text" required /></label></div><button id="sandy-expenses-submit-btn" type="submit">Add Expense</button><p id="sandy-expenses-message"></p></form></section><section class="card"><h2>Expense History</h2><div class="inline-actions"><label>Filter by Year <select id="sandy-expenses-year-filter"><option value="">All Years</option></select></label></div><div class="table-wrap"><table><thead><tr><th>Date</th><th>Amount</th><th>Description</th><th>Actions</th></tr></thead><tbody id="sandy-expenses-body"></tbody><tfoot><tr class="totals-row"><td colspan="1"><strong>Running Total</strong></td><td><strong id="sandy-expenses-total">$0.00</strong></td><td colspan="2"></td></tr></tfoot></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
