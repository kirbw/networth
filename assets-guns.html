<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Finance Tracker - Assets Guns</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="assets-guns">
  <div class="layout">
    <aside class="sidebar"><h2>Finance Tracker</h2><nav class="side-menu"></nav></aside>
    <div class="main-column">
      <header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header>
      <main class="container">
        <section id="auth-card" class="card auth-card hidden"></section>
        <section id="app-content" class="hidden">
          <section class="card admin-subnav-card"><div class="admin-subnav"><a href="/assets-bank-accounts.html">Bank Accounts</a><a href="/assets-cash.html">Cash</a><a href="/assets-vehicles.html">Vehicles</a><a href="/assets-guns.html" class="active">Guns</a></div></section>
          <section class="card">
            <h2>Add Gun</h2>
            <form id="guns-form">
              <div class="form-grid">
                <label>Description <input id="gun-description" type="text" required /></label>
                <label>Type
                  <select id="gun-type" required>
                    <option value="">Select type</option>
                    <option>Handgun</option>
                    <option>Rifle</option>
                    <option>Shotgun</option>
                    <option>Air Rifle</option>
                  </select>
                </label>
                <label>Manufacturer <input id="gun-manufacturer" type="text" /></label>
                <label>Model <input id="gun-model" type="text" /></label>
                <label>Year Acquired <input id="gun-year-acquired" type="number" min="1800" max="3000" /></label>
                <label>Value ($) <input id="gun-value" type="number" min="0" step="0.01" required /></label>
                <label class="full-width">Notes <textarea id="gun-notes" rows="3"></textarea></label>
              </div>
              <button type="submit" id="guns-submit-btn">Add Gun</button>
              <p id="guns-message"></p>
            </form>
          </section>
          <section class="card">
            <h2>Guns</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th data-sort-guns="description" class="sortable">Description</th><th data-sort-guns="gun_type" class="sortable">Type</th><th data-sort-guns="manufacturer" class="sortable">Manufacturer</th><th data-sort-guns="model" class="sortable">Model</th><th data-sort-guns="year_acquired" class="sortable">Year Acquired</th><th>Notes</th><th data-sort-guns="value" class="sortable">Value</th><th>Actions</th></tr></thead>
                <tbody id="guns-body"></tbody>
              </table>
            </div>
          </section>
        </section>
      </main>
    </div>
  </div>
  <footer class="version-footer"><span id="version-info">Version ...</span></footer>
  <script src="app.js"></script>
</body>
</html>
