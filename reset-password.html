<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Finance Tracker - Reset Password</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="reset-password">
  <div class="layout">
    <aside class="sidebar">
      <h2>Finance Tracker</h2>
      <nav class="side-menu">
        <a href="/" class="active">Home</a>
      </nav>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="session-controls">
          <span>Password Reset</span>
        </div>
      </header>

      <main class="container">
        <section class="card">
          <h2>Reset Password</h2>
          <form id="reset-password-page-form">
            <label>Reset Token <input id="reset-token" type="text" required /></label>
            <label>New Password <input id="reset-password-page-new" type="password" required /></label>
            <button type="submit">Set New Password</button>
            <p id="reset-password-page-message"></p>
          </form>
        </section>
      </main>
    </div>
  </div>

  <footer class="version-footer"><span id="version-info">Version ...</span></footer>
  <script src="app.js"></script>
</body>
</html>
