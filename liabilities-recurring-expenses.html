<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Recurring Expenses</title><link rel="stylesheet" href="styles.css" /></head><body data-page="liabilities-recurring-expenses"><div class="layout"><aside class="sidebar"></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"><h2>Sign In</h2><form id="login-form"><label>Username <input id="login-username" type="text" required /></label><label>Password <input id="login-password" type="password" required /></label><button type="submit">Log In</button></form><form id="signup-form" class="hidden"><label>Full Name <input id="signup-full-name" type="text" required /></label><label>Email <input id="signup-email" type="email" required /></label><label>Username <input id="signup-username" type="text" required /></label><label>Password <input id="signup-password" type="password" required /></label><button type="submit">Create Account</button></form><form id="verify-form" class="hidden"><label>Username <input id="verify-username" type="text" required /></label><label>Verification Code <input id="verify-code" type="text" required /></label><button type="submit">Verify Account</button></form><form id="forgot-password-form" class="hidden"><label>Email or Username <input id="forgot-identifier" type="text" required /></label><button type="submit">Send Reset Link</button></form><div class="auth-actions"><button id="toggle-signup-btn" type="button">Create account</button><button id="toggle-verify-btn" type="button">Verify account</button><button id="toggle-forgot-btn" type="button">Forgot password</button><button id="toggle-login-btn" type="button">Back to login</button></div><p id="auth-message"></p></section><section id="app-content" class="hidden"><section class="card admin-subnav-card"><div class="admin-subnav"><a href="/liabilities-mortgages.html">Mortgages</a><a href="/liabilities-credit-cards.html">Credit Cards</a><a href="/liabilities-loans.html">Loans</a><a href="/liabilities-recurring-expenses.html" class="active">Recurring Expenses</a></div></section><section class="card"><h2>Add Recurring Expense</h2><form id="recurring-expenses-form"><div class="form-grid"><label>Description <input id="rec-description" type="text" required /></label><label>Category <input id="rec-category" type="text" placeholder="Internet, Phone, Subscription" /></label><label>Amount ($) <input id="rec-amount" type="number" min="0" step="0.01" required /></label><label>Frequency <select id="rec-frequency"><option value="weekly">Every Week</option><option value="monthly">Every Month</option><option value="quarterly">Every Quarter</option><option value="yearly">Every Year</option></select></label><label>Start Date <input id="rec-start-date" type="date" /></label></div><button id="recurring-expenses-submit-btn" type="submit">Add Recurring Expense</button><p id="recurring-expenses-message"></p></form></section><section class="card"><h2>Recurring Expenses</h2><div class="table-wrap"><table><thead><tr><th>Description</th><th>Category</th><th>Amount</th><th>Frequency</th><th>Start Date</th><th>Actions</th></tr></thead><tbody id="recurring-expenses-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
