<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Annual Finance Tracker - Admin Notifications</title><link rel="stylesheet" href="styles.css" /></head>
<body data-page="admin-notifications"><div class="layout"><aside class="sidebar"><h2>Finance Tracker</h2><nav class="side-menu"></nav></aside><div class="main-column"><header class="topbar"><div class="session-controls"><span id="session-name">Not signed in</span><button id="logout-btn" type="button">Logout</button></div></header><main class="container"><section id="auth-card" class="card auth-card hidden"></section><section id="app-content" class="hidden"><section class="card admin-subnav-card"><div class="admin-subnav"><a href="/admin-users.html">User Settings</a><a href="/admin-email.html">Email Settings</a><a href="/admin-backups.html">Backup Settings</a><a href="/admin-updates.html">Updates</a><a href="/admin-notifications.html" class="active">Notifications</a></div></section><section class="card"><h2>Send System Notification</h2><form id="admin-notification-form"><div class="form-grid"><label>Title <input id="admin-notification-title" type="text" required /></label><label class="full-width">Message <textarea id="admin-notification-body" rows="4" required></textarea></label></div><button type="submit">Send to All Users</button><p id="admin-notification-message"></p></form></section><section class="card"><h2>Sent Notifications</h2><div class="table-wrap"><table><thead><tr><th>Created</th><th>Title</th><th>Message</th><th>Sender</th></tr></thead><tbody id="admin-notification-history-body"></tbody></table></div></section></section></main></div></div><footer class="version-footer"><span id="version-info">Version ...</span></footer><script src="app.js"></script></body></html>
