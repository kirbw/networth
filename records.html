<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Annual Finance Tracker - Records</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="records">
  <div class="layout">
    <aside class="sidebar">
      <h2>Finance Tracker</h2>
      <nav class="side-menu">
        <a href="/">Home</a>
        <a href="/records.html" class="active">Records</a>
        <a href="/investments.html">Investments</a>
        <a id="nav-admin" href="/admin-users.html" class="hidden">Admin</a>
      </nav>
    </aside>

    <div class="main-column">
      <header class="topbar">
        <div class="session-controls">
          <span id="session-name">Not signed in</span>
          <button id="logout-btn" type="button">Logout</button>
        </div>
      </header>

      <main class="container">
        <section id="auth-card" class="card auth-card hidden">
          <h2>Sign In</h2>
          <form id="login-form">
            <label>Username <input id="login-username" type="text" required /></label>
            <label>Password <input id="login-password" type="password" required /></label>
            <button type="submit">Log In</button>
          </form>
          <form id="signup-form" class="hidden">
            <label>Full Name <input id="signup-full-name" type="text" required /></label>
            <label>Email <input id="signup-email" type="email" required /></label>
            <label>Username <input id="signup-username" type="text" required /></label>
            <label>Password <input id="signup-password" type="password" required /></label>
            <button type="submit">Create Account</button>
          </form>
          <form id="verify-form" class="hidden">
            <label>Username <input id="verify-username" type="text" required /></label>
            <label>Verification Code <input id="verify-code" type="text" required /></label>
            <button type="submit">Verify Account</button>
          </form>
          <form id="forgot-password-form" class="hidden">
            <label>Email or Username <input id="forgot-identifier" type="text" required /></label>
            <button type="submit">Send Reset Link</button>
          </form>
          <div class="auth-actions">
            <button id="toggle-signup-btn" type="button">Create account</button>
            <button id="toggle-verify-btn" type="button">Verify account</button>
            <button id="toggle-forgot-btn" type="button">Forgot password</button>
            <button id="toggle-login-btn" type="button">Back to login</button>
          </div>
          <p id="auth-message"></p>
        </section>

        <section id="app-content" class="hidden">
          <section class="card">
            <h2>Saved Annual Records</h2>
            <div class="table-wrap">
              <table>
                <thead><tr><th>Year</th><th>Income</th><th>Donated</th><th>Net Worth</th><th>Actions</th></tr></thead>
                <tbody id="records-body"></tbody>
              </table>
            </div>
            <button id="clear-data" class="danger" type="button">Clear All Data</button>
          </section>

          <section id="record-editor-card" class="card">
            <h2>Edit Record</h2>
            <form id="edit-form">
              <div class="form-grid">
                <label>Year <input id="edit-year" type="number" min="1970" max="3000" required /></label>
                <label>Income ($) <input id="edit-income" type="number" min="0" step="0.01" required /></label>
                <label>Donations ($) <input id="edit-donation" type="number" min="0" step="0.01" required /></label>
                <label>Net Worth ($) <input id="edit-netWorth" type="number" step="0.01" /></label>
              </div>
              <button type="submit">Save Changes</button>
              <p id="records-message"></p>
            </form>
          </section>
        </section>
      </main>
    </div>
  </div>

  <footer class="version-footer"><span id="version-info">Version ...</span></footer>
  <script src="app.js"></script>
</body>
</html>
